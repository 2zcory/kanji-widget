name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example `v1.4.0`
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag_name }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          test -n "$RELEASE_TAG"
          git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1

          RELEASE_NOTES_FILE="docs/releases/${RELEASE_TAG}.md"
          test -f "$RELEASE_NOTES_FILE"

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_FILE=$RELEASE_NOTES_FILE" >> "$GITHUB_ENV"

      - name: Validate app version matches release tag
        run: |
          APP_VERSION_NAME="$(sed -n 's/.*versionName = "\(.*\)"/\1/p' app/build.gradle.kts | head -n 1)"
          test -n "$APP_VERSION_NAME"
          EXPECTED_TAG="v${APP_VERSION_NAME}"
          test "$RELEASE_TAG" = "$EXPECTED_TAG"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/kanji-widget-release.jks"

      - name: Prepare local.properties
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
          cat > local.properties <<EOF
          sdk.dir=${ANDROID_SDK_ROOT}
          release.storeFile=${RUNNER_TEMP}/kanji-widget-release.jks
          release.storePassword=${RELEASE_STORE_PASSWORD}
          release.keyAlias=${RELEASE_KEY_ALIAS}
          release.keyPassword=${RELEASE_KEY_PASSWORD}
          EOF

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanji-widget-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: ${{ env.RELEASE_NOTES_FILE }}
          files: app/build/outputs/apk/release/app-release.apk
